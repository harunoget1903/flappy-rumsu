<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy-Rumsu 🎈</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#1b1230;
    font-family:'Fredoka',ui-rounded,'Hiragino Maru Gothic ProN','Trebuchet MS',sans-serif;
    color:#fff4e6;touch-action:none;user-select:none;-webkit-user-select:none;}
  #stage{position:fixed;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:24px;z-index:10;
    transition:opacity .4s ease, visibility .4s;}
  .hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .panel{background:rgba(20,12,40,.85);backdrop-filter:blur(10px);border:2px solid rgba(255,209,102,.45);
    border-radius:28px;padding:26px 24px;max-width:340px;width:100%;
    box-shadow:0 0 40px rgba(255,143,177,.25), 0 20px 60px rgba(0,0,0,.5);}
  .title{font-size:clamp(26px,7vw,40px);font-weight:700;color:#ffd166;
    text-shadow:0 0 18px rgba(255,209,102,.6), 0 3px 0 rgba(0,0,0,.3);line-height:1.15;}
  .subtitle{font-size:clamp(14px,4vw,17px);opacity:.92;margin-top:10px;line-height:1.55;}
  .special{margin-top:12px;font-size:clamp(13px,3.8vw,15px);color:#ff8fb1;font-weight:600;}
  .big-btn{margin-top:20px;padding:15px 38px;font-family:inherit;font-size:clamp(16px,4.5vw,20px);
    font-weight:700;color:#241a38;background:linear-gradient(180deg,#ffe08a,#ffd166);
    border:none;border-radius:999px;box-shadow:0 5px 0 #c99a2e,0 0 26px rgba(255,209,102,.5);
    cursor:pointer;transition:transform .1s;animation:btnpulse 1.6s infinite ease-in-out;}
  .big-btn:active{transform:translateY(4px) scale(.98);box-shadow:0 1px 0 #c99a2e;}
  @keyframes btnpulse{0%,100%{box-shadow:0 5px 0 #c99a2e,0 0 18px rgba(255,209,102,.4)}
    50%{box-shadow:0 5px 0 #c99a2e,0 0 34px rgba(255,143,177,.7)}}

  .avatar{width:112px;height:112px;border-radius:50%;border:4px solid #ffd166;
    box-shadow:0 0 0 5px rgba(255,143,177,.4), 0 0 40px rgba(255,143,177,.5);
    display:block;margin:0 auto 14px;animation:avafloat 3s infinite ease-in-out;}
  @keyframes avafloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
  #goName{font-size:clamp(28px,8vw,42px);color:#ff8fb1;font-weight:700;
    text-shadow:0 0 22px rgba(255,143,177,.7), 0 3px 0 rgba(0,0,0,.3);margin-top:2px;}
  #goDate{font-size:14px;letter-spacing:3px;color:#7ee8d8;margin-top:4px;text-shadow:0 0 12px rgba(126,232,216,.6);}
  .score-row{display:flex;justify-content:center;gap:20px;margin-top:16px;}
  .score-box{background:rgba(255,255,255,.08);border-radius:16px;padding:10px 18px;min-width:96px;}
  .score-box .lbl{font-size:12px;opacity:.7;letter-spacing:1px;}
  .score-box .val{font-size:28px;font-weight:700;color:#ffd166;}
  #newRecord{margin-top:12px;font-size:15px;color:#7ee8d8;font-weight:700;display:none;
    animation:blink .8s infinite alternate;}
  @keyframes blink{from{opacity:.4;transform:scale(.97)}to{opacity:1;transform:scale(1.04)}}

  #hudScore{position:absolute;top:5%;left:0;right:0;text-align:center;z-index:5;
    font-size:clamp(50px,14vw,84px);font-weight:700;color:rgba(255,244,230,.95);
    text-shadow:0 0 24px rgba(255,209,102,.55), 0 4px 0 rgba(0,0,0,.25);pointer-events:none;display:none;
    transition:transform .12s ease;}
  #hudScore.pop{transform:scale(1.25);}
  #toast{position:absolute;top:20%;left:0;right:0;text-align:center;z-index:6;pointer-events:none;
    font-size:clamp(20px,6vw,30px);font-weight:700;color:#ffd166;
    text-shadow:0 0 16px rgba(255,209,102,.8);opacity:0;transition:opacity .35s, transform .35s;
    transform:translateY(10px);}
  #toast.show{opacity:1;transform:translateY(0);}

  #muteBtn{position:absolute;top:14px;right:14px;z-index:20;width:46px;height:46px;
    border-radius:50%;border:2px solid rgba(255,209,102,.5);background:rgba(20,12,40,.7);
    color:#ffd166;font-size:20px;cursor:pointer;backdrop-filter:blur(6px);}
  #muteBtn:active{transform:scale(.92);}
  #bestHud{position:absolute;top:22px;right:70px;z-index:20;padding:7px 14px;
    border-radius:999px;border:1.5px solid rgba(255,209,102,.4);background:rgba(20,12,40,.7);
    color:#ffd166;font-size:13px;font-weight:700;letter-spacing:1px;backdrop-filter:blur(6px);
    pointer-events:none;}

  @media (prefers-reduced-motion:reduce){
    .big-btn,.avatar,#newRecord{animation:none;}
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <canvas id="fx"></canvas>
  <div id="hudScore">0</div>
  <div id="toast"></div>
  <button id="muteBtn" title="Müzik aç/kapat">🔊</button>
  <div id="bestHud">🏆 BEST 0</div>

  const intro=document.getElementById('intro'), over=document.getElementById('gameover');
  const toast=document.getElementById('toast');
  let toastTimer=null;
  function showToast(msg){
    toast.textContent=msg; toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>toast.classList.remove('show'),1500);
  }
  function popScore(){
    hudScore.classList.add('pop');
    setTimeout(()=>hudScore.classList.remove('pop'),130);
  }

  function addScore(n){
    score+=n;
    hudScore.textContent=score; popScore(); setBpm();
    if(score===19 && !blast19done){
      blast19done=true;
      dateBlast={t:0};
      burst(W/2,H*0.38,140);
      launchFirework(true); launchFirework(false); launchFirework(true);
      if(navigator.vibrate) try{navigator.vibrate([50,30,50,30,150]);}catch(_){}
    }
  }

  function reset(){
    score=0; pipes=[]; cakes=[]; dateBlast=null; blast19done=false;
    bird.x=W*0.3; bird.y=H*0.45; bird.vy=0;
    hudScore.textContent='0';
  }

  function start(){
    reset();
    initAudio(); startMusic();
    intro.classList.add('hidden'); over.classList.add('hidden');
    hudScore.style.display='block';
    state=ST.PLAY;
    flap();
  }
  document.getElementById('startBtn').addEventListener('click',start);
  document.getElementById('againBtn').addEventListener('click',start);

  /* ---------- Kontrol ---------- */
  function flap(){
    if(state!==ST.PLAY) return;
    bird.vy=FLAP;
    if(navigator.vibrate) try{navigator.vibrate(10);}catch(_){}
  }
  window.addEventListener('pointerdown',e=>{
    if(e.target.closest('button')) return;
    initAudio(); flap();
  });
  window.addEventListener('keydown',e=>{
    if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); flap(); }
  });

  /* ---------- Borular ---------- */
  function spawnPipe(){
    const gap=gapSize();
    const margin=H*0.12;
    const gy=margin + Math.random()*(H - margin*2 - gap);
    pipes.push({x:W+60, w:74, gy, gap, passed:false,
      hue:[['#ff8fb1','#e06a90'],['#7ee8d8','#4bbfae'],['#ffd166','#dfa93a'],['#a86fd0','#8a4fb0']][Math.floor(Math.random()*4)]});
    if(Math.random()<0.35){
      const TREATS=['🧁','🍩','🍭','🍫','🍬','🍪','🎂'];
      cakes.push({x:W+60+37, y:gy+gap/2, taken:false, bob:Math.random()*6.28,
        e:TREATS[Math.floor(Math.random()*TREATS.length)]});
    }
  }

  function drawGiftTower(x,w,y0,y1,cols){
    const bh=56;
    g.save();
    g.beginPath(); g.rect(x,y0,w,y1-y0); g.clip();
    let i=0;
    for(let y=y0; y<y1; y+=bh, i++){
      const c = i%2===0 ? cols[0] : cols[1];
      g.fillStyle=c; g.fillRect(x,y,w,bh-4);
      g.fillStyle='rgba(255,255,255,0.55)';
      g.fillRect(x+w/2-5,y,10,bh-4);
      g.fillRect(x,y+bh/2-7,w,10);
    }
    g.restore();
    g.strokeStyle='rgba(0,0,0,0.25)'; g.lineWidth=3;
    g.strokeRect(x,y0,w,y1-y0);
  }

  /* ---------- Parçacıklar ---------- */
  const COLORS=['#ffd166','#ff8fb1','#7ee8d8','#a86fd0','#63c94e','#ff6b6b','#fff4e6'];
  let parts=[];
  const MAXPARTS=520;
  function burst(x,y,n){
    for(let i=0;i<n;i++){
      if(parts.length>MAXPARTS) return;
      const a=Math.random()*6.28, s=3+Math.random()*8;
      parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,
        w:5+Math.random()*7,h:8+Math.random()*8,round:false,
        c:COLORS[Math.floor(Math.random()*COLORS.length)],
        r:Math.random()*6.28,rs:(Math.random()-0.5)*0.3,
        life:0,max:2400+Math.random()*1500,grav:0.12});
    }
  }
  function sparkle(x,y){
    if(parts.length>MAXPARTS) return;
    parts.push({x:x+(Math.random()-0.5)*14, y:y+(Math.random()-0.5)*14,
      vx:-1-Math.random()*1.5, vy:(Math.random()-0.5)*1.2,
      w:3,h:3,round:true,c:Math.random()<0.5?'#ffd166':'#ff8fb1',
      r:0,rs:0,life:0,max:500+Math.random()*350,grav:0});
  }
  function fxLoop(dt){
    fx.clearRect(0,0,W,H);
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i]; p.life+=dt;
      if(p.life>p.max){parts.splice(i,1);continue;}
      p.vy+=p.grav; p.vx*=0.99; p.x+=p.vx; p.y+=p.vy; p.r+=p.rs;
      fx.save(); fx.translate(p.x,p.y); fx.rotate(p.r);
      fx.globalAlpha=Math.min(1,(p.max-p.life)/500);
      fx.fillStyle=p.c;
      if(p.round){ fx.beginPath(); fx.arc(0,0,p.w,0,7); fx.fill(); }
      else fx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      fx.restore();
    }
    // havai fişek yazıları
    for(let i=fwTexts.length-1;i>=0;i--){
      const f=fwTexts[i]; f.t+=dt;
      const k=f.t/2200;
      if(k>=1){fwTexts.splice(i,1);continue;}
      const sc=0.6+Math.min(k*3,1)*0.5;
      fx.save(); fx.translate(f.x, f.y-30*k);
      fx.scale(sc,sc);
      fx.globalAlpha=k<0.15?k/0.15:(1-k);
      fx.font='bold 30px Fredoka, Trebuchet MS, sans-serif';
      fx.textAlign='center';
      fx.shadowColor=f.c; fx.shadowBlur=22;
      fx.fillStyle='#fff4e6';
      fx.fillText(f.msg,0,0);
      fx.restore();
    }
    // 19.07 patlaması
    if(dateBlast){
      dateBlast.t+=dt;
      const k=dateBlast.t/2400;
      if(k>=1){ dateBlast=null; }
      else{
        const sc = k<0.25 ? 0.2+ (k/0.25)*1.3 : 1.5 - (k-0.25)*0.15;
        fx.save(); fx.translate(W/2, H*0.38);
        fx.scale(sc,sc);
        fx.globalAlpha = k<0.1?k/0.1 : k>0.75?(1-k)/0.25 : 1;
        fx.font='bold '+Math.min(W*0.22,120)+'px Fredoka, Trebuchet MS, sans-serif';
        fx.textAlign='center'; fx.textBaseline='middle';
        fx.shadowColor='#ffd166'; fx.shadowBlur=40;
        fx.fillStyle='#ffd166';
        fx.fillText('19.07',0,0);
        fx.shadowBlur=0; fx.lineWidth=2.5; fx.strokeStyle='#ff8fb1';
        fx.strokeText('19.07',0,0);
        fx.restore();
      }
    }
  }

  /* ---------- Ölüm ---------- */
  function die(){
    if(state!==ST.PLAY) return;
    state=ST.DEAD; shake=14;
    stopMusicNow();
    gameOverJingle();
    if(navigator.vibrate) try{navigator.vibrate([70,40,120]);}catch(_){}
    burst(bird.x,bird.y,90);
    launchFirework(true); launchFirework(false);
    let isRecord=false;
    if(score>best){ best=score; isRecord=true;
      try{ localStorage.setItem('rumsuBest',String(best)); }catch(_){}
      bestHud.textContent='🏆 BEST '+best;
    }
    document.getElementById('finalScore').textContent=score;
    document.getElementById('bestScore').textContent=best;
    document.getElementById('newRecord').style.display=isRecord&&score>0?'block':'none';
    hudScore.style.display='none';
    setTimeout(()=>{
      over.classList.remove('hidden');
      burst(W/2,H*0.3,80);
      launchFirework(true);
    },700);
  }

  /* ---------- Ana döngü ---------- */
  function update(dt){
    const ds=dt/1000;
    t+=dt;

    if(state===ST.PLAY){
      bird.vy=Math.min(bird.vy+GRAV*ds, MAXFALL);
      bird.y+=bird.vy*ds;
      if(bird.y<bird.r){ bird.y=bird.r; bird.vy=0; }
      if(bird.y>H-bird.r-14) die();

      const sp=speed()*ds;
      for(const p of pipes) p.x-=sp;
      for(const c of cakes) c.x-=sp;

      if(pipes.length===0 || pipes[pipes.length-1].x < W - Math.max(W*0.52,250)) spawnPipe();
      if(pipes[0] && pipes[0].x<-100) pipes.shift();

      for(const p of pipes){
        if(!p.passed && p.x+p.w<bird.x){
          p.passed=true;
          addScore(1);
        }
        const rr=bird.r*0.82;
        if(bird.x+rr>p.x && bird.x-rr<p.x+p.w){
          if(bird.y-rr<p.gy || bird.y+rr>p.gy+p.gap) die();
        }
      }
      for(const c of cakes){
        if(!c.taken && Math.hypot(c.x-bird.x,c.y-bird.y)<bird.r+20){
          c.taken=true;
          // 18'deyken +2 vermek 19'u atlatirdi; 19.07 patlamasi mutlaka gorulsun
          const bonus = (score===18) ? 1 : 2;
          addScore(bonus);
          showToast(c.e+' +'+bonus+'!');
          burst(c.x,c.y,20);
        }
      }
      cakes=cakes.filter(c=>!c.taken && c.x>-60);

      // ışıltı izi
      if(Math.random()<0.7) sparkle(bird.x-bird.r, bird.y);

      // havai fişek zamanlayıcı
      fwTimer-=dt;
      if(fwTimer<=0){
        launchFirework(Math.random()<0.5);
        fwTimer=3200+Math.random()*3000-Math.min(score*40,1500);
      }
    }else if(state===ST.DEAD){
      bird.vy=Math.min(bird.vy+GRAV*ds, MAXFALL);
      bird.y=Math.min(bird.y+bird.vy*ds, H-bird.r-14);
    }else{
      bird.x=W*0.3; bird.y=H*0.45+Math.sin(t*0.002)*14; bird.vy=0;
    }

    // roketler
    for(let i=rockets.length-1;i>=0;i--){
      const r=rockets[i];
      r.y+=r.vy*dt;
      if(Math.random()<0.5 && parts.length<MAXPARTS)
        parts.push({x:r.x+(Math.random()-0.5)*4,y:r.y+8,vx:0,vy:0.5,
          w:2.5,h:2.5,round:true,c:r.c,r:0,rs:0,life:0,max:350,grav:0.02});
      if(r.y<=r.ty){ explodeFirework(r); rockets.splice(i,1); }
    }

    // süzülen yazılar
    floatTimer-=dt;
    if(floatTimer<=0){ spawnFloatText(); floatTimer=2600+Math.random()*2600; }
    for(let i=floatTexts.length-1;i>=0;i--){
      const f=floatTexts[i];
      f.x-=f.v*ds;
      if(f.x<-260) floatTexts.splice(i,1);
    }

    /* ---------- ÇİZİM ---------- */
    g.clearRect(0,0,W,H);
    let ox=0, oy=0;
    if(shake>0){ shake-=dt*0.02; ox=(Math.random()-0.5)*shake; oy=(Math.random()-0.5)*shake; }
    g.save(); g.translate(ox,oy);

    // gökyüzü (seviyeyle hafif renk değişimi)
    const lv=level();
    const sky=g.createLinearGradient(0,0,0,H);
    const hueShift=Math.min(lv*8,40);
    sky.addColorStop(0,'#1b1230');
    sky.addColorStop(0.55,`hsl(${262+hueShift},42%,21%)`);
    sky.addColorStop(1,`hsl(${283+hueShift},36%,29%)`);
    g.fillStyle=sky; g.fillRect(-20,-20,W+40,H+40);

    // yıldızlar
    for(const s of stars){
      g.globalAlpha=0.3+0.4*Math.abs(Math.sin(t*0.001*s.sp+s.tw));
      g.fillStyle='#ffe9b8';
      g.beginPath(); g.arc(s.x*W,s.y*H,s.r,0,7); g.fill();
    }
    g.globalAlpha=1;

    // arka planda gezen Rümeysa yüzü
    if(faceBg.complete && faceBg.naturalWidth>0){
      bgFace.t+=dt*0.00008;
      const size=Math.min(W,H)*0.42;
      const fxp=W*0.5 + Math.sin(bgFace.t*3.1)*W*0.32;
      const fyp=H*0.36 + Math.cos(bgFace.t*2.3)*H*0.22;
      g.globalAlpha=0.11;
      g.drawImage(faceBg, fxp-size/2, fyp-size/2, size, size);
      g.globalAlpha=1;
    }

    // süzülen kutlama yazıları
    for(const f of floatTexts){
      g.globalAlpha=f.a;
      g.font='600 '+f.size+'px Fredoka, Trebuchet MS, sans-serif';
      g.textAlign='left';
      g.fillStyle='#ffe9c9';
      g.fillText(f.msg, f.x, f.y+Math.sin(t*0.002+f.wob)*8);
    }
    g.globalAlpha=1;

    // "Rümeysa" balonları
    for(const b of bgBalloons){
      b.y-=b.v*ds/H;
      if(b.y<-0.15){ b.y=1.15; b.x=Math.random(); }
      const bx=b.x*W + Math.sin(t*0.001+b.wob)*12;
      const by=b.y*H;
      g.globalAlpha=0.5;
      // ip
      g.strokeStyle=b.c; g.lineWidth=1.2;
      g.beginPath(); g.moveTo(bx,by+b.s*1.15);
      g.quadraticCurveTo(bx+6,by+b.s*1.15+18,bx,by+b.s*1.15+34); g.stroke();
      // balon
      g.fillStyle=b.c;
      g.beginPath(); g.ellipse(bx,by,b.s*0.82,b.s,0,0,7); g.fill();
      g.fillStyle='rgba(255,255,255,0.35)';
      g.beginPath(); g.ellipse(bx-b.s*0.28,by-b.s*0.32,b.s*0.2,b.s*0.3,-0.4,0,7); g.fill();
      // isim
      g.fillStyle='rgba(30,15,45,0.85)';
      g.font='bold '+Math.round(b.s*0.34)+'px Fredoka, Trebuchet MS, sans-serif';
      g.textAlign='center'; g.textBaseline='middle';
      g.fillText('Rümeysa', bx, by+1);
      g.globalAlpha=1;
    }
    g.textBaseline='alphabetic';

    // hediye kuleleri
    for(const p of pipes){
      drawGiftTower(p.x,p.w,-10,p.gy,p.hue);
      drawGiftTower(p.x,p.w,p.gy+p.gap,H,p.hue);
      g.font='26px serif'; g.textAlign='center';
      g.fillText('🎀', p.x+p.w/2, p.gy-8);
      g.fillText('🎀', p.x+p.w/2, p.gy+p.gap+26);
    }

    // tatlılar
    g.font='30px serif'; g.textAlign='center'; g.textBaseline='middle';
    for(const c of cakes){
      c.bob+=dt*0.005;
      g.fillText(c.e, c.x, c.y+Math.sin(c.bob)*6);
    }
    g.textBaseline='alphabetic';

    // zemin
    g.fillStyle='rgba(255,143,177,0.16)'; g.fillRect(-20,H-14,W+40,20);

    // --- Rumsu ---
    const tilt=Math.max(-0.5,Math.min(0.7,bird.vy/700));
    g.save();
    g.translate(bird.x,bird.y);
    g.rotate(tilt*0.6);
    // balon
    const bpulse=1+Math.sin(t*0.006)*0.04;
    g.fillStyle='#ff6b8a';
    g.beginPath(); g.ellipse(0,-bird.r-38,20*bpulse,25*bpulse,0,0,7); g.fill();
    g.fillStyle='rgba(255,255,255,0.35)';
    g.beginPath(); g.ellipse(-7,-bird.r-46,6,9,-0.4,0,7); g.fill();
    g.strokeStyle='#e0517a'; g.lineWidth=2;
    g.beginPath(); g.moveTo(0,-bird.r-13); g.quadraticCurveTo(4,-bird.r-6,0,-bird.r+2); g.stroke();
    g.fillStyle='#e0517a';
    g.beginPath(); g.moveTo(-4,-bird.r-13); g.lineTo(4,-bird.r-13); g.lineTo(0,-bird.r-7); g.closePath(); g.fill();
    // parlayan hale
    g.shadowColor='#ffd166'; g.shadowBlur=18;
    // fotoğraf kafa
    if(faceImg.complete && faceImg.naturalWidth>0){
      g.save();
      g.beginPath(); g.arc(0,0,bird.r,0,7); g.clip();
      g.drawImage(faceImg,-bird.r,-bird.r,bird.r*2,bird.r*2);
      g.restore();
      g.strokeStyle='#ffd166'; g.lineWidth=3.5;
      g.beginPath(); g.arc(0,0,bird.r,0,7); g.stroke();
    }else{
      g.fillStyle='#ffd166';
      g.beginPath(); g.arc(0,0,bird.r,0,7); g.fill();
    }
    g.shadowBlur=0;
    g.restore();

    g.restore(); // shake
  }

  /* ---------- TEKNO MÜZİK (Web Audio) ---------- */
  let AC=null, master=null, musicBus=null, muted=false, musicOn=false;
  let bpm=122, step=0, nextNote=0, schedTimer=null;
  const muteBtn=document.getElementById('muteBtn');

  function initAudio(){
    if(AC) { if(AC.state==='suspended') AC.resume(); return; }
    try{
      AC=new (window.AudioContext||window.webkitAudioContext)();
      master=AC.createGain(); master.gain.value=0.5;
      musicBus=AC.createGain(); musicBus.gain.value=1;
      const comp=AC.createDynamicsCompressor();
      musicBus.connect(master);
      master.connect(comp); comp.connect(AC.destination);
    }catch(_){}
  }
  function setBpm(){ bpm = 122 + Math.min(score*2, 66); }

  function kick(time){
    const o=AC.createOscillator(), gn=AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(150,time);
    o.frequency.exponentialRampToValueAtTime(42,time+0.11);
    gn.gain.setValueAtTime(0.9,time);
    gn.gain.exponentialRampToValueAtTime(0.001,time+0.22);
    o.connect(gn); gn.connect(musicBus);
    o.start(time); o.stop(time+0.25);
  }
  let noiseBuf=null;
  function noise(){
    if(noiseBuf) return noiseBuf;
    const b=AC.createBuffer(1,AC.sampleRate*0.3,AC.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    noiseBuf=b; return b;
  }
  function hat(time,open){
    const s=AC.createBufferSource(); s.buffer=noise();
    const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
    const gn=AC.createGain();
    gn.gain.setValueAtTime(open?0.24:0.16,time);
    gn.gain.exponentialRampToValueAtTime(0.001,time+(open?0.16:0.05));
    s.connect(f); f.connect(gn); gn.connect(musicBus);
    s.start(time); s.stop(time+0.2);
  }
  function clap(time){
    const s=AC.createBufferSource(); s.buffer=noise();
    const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1600; f.Q.value=1.2;
    const gn=AC.createGain();
    gn.gain.setValueAtTime(0.3,time);
    gn.gain.exponentialRampToValueAtTime(0.001,time+0.12);
    s.connect(f); f.connect(gn); gn.connect(musicBus);
    s.start(time); s.stop(time+0.15);
  }
  const BASSNOTES=[55,55,55,82.4,55,55,65.4,55, 55,55,55,82.4,55,73.4,65.4,49];
  function bass(time,i){
    const o=AC.createOscillator(), gn=AC.createGain(), f=AC.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=BASSNOTES[i%16];
    f.type='lowpass'; f.frequency.value=380+Math.min(score*6,320); f.Q.value=6;
    gn.gain.setValueAtTime(0.22,time);
    gn.gain.exponentialRampToValueAtTime(0.001,time+0.13);
    o.connect(f); f.connect(gn); gn.connect(musicBus);
    o.start(time); o.stop(time+0.15);
  }
  const ARP=[440,523.25,659.25,880,659.25,523.25];
  function lead(time,i){
    const o=AC.createOscillator(), gn=AC.createGain(), f=AC.createBiquadFilter();
    o.type='square'; o.frequency.value=ARP[i%ARP.length];
    f.type='lowpass'; f.frequency.value=2400;
    gn.gain.setValueAtTime(0.055,time);
    gn.gain.exponentialRampToValueAtTime(0.001,time+0.16);
    o.connect(f); f.connect(gn); gn.connect(musicBus);
    o.start(time); o.stop(time+0.18);
  }
  function playFwSound(){
    if(!AC||muted||!musicOn) return;
    const time=AC.currentTime;
    const s=AC.createBufferSource(); s.buffer=noise();
    const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
    const gn=AC.createGain();
    gn.gain.setValueAtTime(0.2,time);
    gn.gain.exponentialRampToValueAtTime(0.001,time+0.5);
    s.connect(f); f.connect(gn); gn.connect(musicBus);
    s.start(time); s.stop(time+0.5);
  }

  function scheduler(){
    if(!AC||!musicOn) return;
    const sixteenth=15/bpm;   // 60/bpm/4
    while(nextNote < AC.currentTime+0.12){
      if(!muted){
        const st=step%16;
        if(st%4===0) kick(nextNote);
        if(st%4===2) hat(nextNote,true);
        else if(st%2===1) hat(nextNote,false);
        if(st===4||st===12) clap(nextNote);
        bass(nextNote,st);
        if(state===ST.PLAY && score>=5 && st%2===0) lead(nextNote,(step>>1));
      }
      nextNote+=sixteenth;
      step++;
    }
  }
  function startMusic(){
    if(!AC) return;
    if(AC.state==='suspended') AC.resume();
    if(musicBus){
      musicBus.gain.cancelScheduledValues(AC.currentTime);
      musicBus.gain.setValueAtTime(1,AC.currentTime);
    }
    if(musicOn) return;
    musicOn=true;
    nextNote=AC.currentTime+0.06; step=0;
    schedTimer=setInterval(scheduler,25);
  }
  function stopMusicNow(){
    musicOn=false;
    if(schedTimer){ clearInterval(schedTimer); schedTimer=null; }
    if(AC && musicBus){
      // kuyruktaki notalari da aninda sustur
      musicBus.gain.cancelScheduledValues(AC.currentTime);
      musicBus.gain.setValueAtTime(0,AC.currentTime);
    }
  }
  function gameOverJingle(){
    if(!AC || muted) return;
    const t0=AC.currentTime+0.12;
    // klasik komik "vah vah vah vaaah" trombon düşüşü
    const notes=[392,370,349.2];
    notes.forEach((f,i)=>{
      const o=AC.createOscillator(), gn=AC.createGain(), fl=AC.createBiquadFilter();
      o.type='sawtooth'; o.frequency.value=f;
      fl.type='lowpass'; fl.frequency.value=1200;
      const ts=t0+i*0.32;
      gn.gain.setValueAtTime(0.0001,ts);
      gn.gain.exponentialRampToValueAtTime(0.3,ts+0.03);
      gn.gain.exponentialRampToValueAtTime(0.001,ts+0.28);
      o.connect(fl); fl.connect(gn); gn.connect(master);
      o.start(ts); o.stop(ts+0.3);
    });
    // son uzun kayan nota + vibrato
    const ts=t0+3*0.32;
    const o=AC.createOscillator(), gn=AC.createGain(), fl=AC.createBiquadFilter();
    o.type='sawtooth';
    o.frequency.setValueAtTime(329.6,ts);
    o.frequency.exponentialRampToValueAtTime(233,ts+0.9);
    const lfo=AC.createOscillator(), lg=AC.createGain();
    lfo.frequency.value=7; lg.gain.value=9;
    lfo.connect(lg); lg.connect(o.frequency);
    fl.type='lowpass'; fl.frequency.value=1100;
    gn.gain.setValueAtTime(0.0001,ts);
    gn.gain.exponentialRampToValueAtTime(0.32,ts+0.04);
    gn.gain.exponentialRampToValueAtTime(0.001,ts+1.1);
    o.connect(fl); fl.connect(gn); gn.connect(master);
    o.start(ts); lfo.start(ts); o.stop(ts+1.15); lfo.stop(ts+1.15);
  }
  muteBtn.addEventListener('click',()=>{
    initAudio();
    muted=!muted;
    muteBtn.textContent=muted?'🔇':'🔊';
    if(!muted) startMusic();
  });

  /* ---------- Döngü ---------- */
  let last=performance.now();
  function loop(now){
    const dt=Math.min(50,now-last); last=now;
    update(dt); fxLoop(dt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
